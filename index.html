<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Chicken Life — My Little Chick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-wrapper">
    <div id="game-stage">

      <header id="top-bar" class="pixel-panel">
        <div class="top-left">
          <canvas id="top-avatar-canvas" width="32" height="32"></canvas>
          <div>
            <span id="chick-name" class="pixel-title">CHICK</span>
            <span class="pixel-sub">Lv. <span id=\"stat-level\">1</span></span>
          </div>
        </div>
        <div class="top-mid">
          <span class="pixel-sub">AGE <span id="stat-age">0</span>D</span>
          <span class="pixel-sub" id="stage-label">EGG</span>
        </div>
        <div class="top-right">
          <span class="pixel-sub">💰 <span id="stat-gold">50</span></span>
          <button class="icon-btn" data-action="settings" style="margin-left:4px;">⚙️</button>
        </div>
      </header>

      <main id="main-scene">
        <canvas id="bg-canvas"></canvas>
        <canvas id="chick-canvas"></canvas>
        <div id="poop-layer"></div>
        <div id="bubble" class="pixel-panel hidden">🍗</div>
        <div id="toast" class="pixel-panel hidden"></div>
        
        <div id="scene-selectors">
          <button class="bg-btn" data-bg="room">🏠</button>
          <button class="bg-btn" data-bg="grass">🌱</button>
          <button class="bg-btn" data-bg="farm">🚜</button>
          <button class="bg-btn" data-bg="forest">🌲</button>
          <button class="bg-btn" data-bg="snow">❄️</button>
          <button class="bg-btn" data-bg="night">🌙</button>
        </div>
      </main>

      <section id="stat-bars">
        <div class="bar-row">
          <span class="bar-label">❤️健康</span>
          <div class="bar-bg"><div id="bar-health" class="bar-fill" style="width:100%;"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">🍗飽食</span>
          <div class="bar-bg"><div id="bar-hunger" class="bar-fill" style="width:100%;"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">😊心情</span>
          <div class="bar-bg"><div id="bar-happy" class="bar-fill" style="width:100%;"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">⚡活力</span>
          <div class="bar-bg"><div id="bar-energy" class="bar-fill" style="width:100%;"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">🧼清潔</span>
          <div class="bar-bg"><div id="bar-clean" class="bar-fill" style="width:100%;"></div></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">💤睡眠</span>
          <div class="bar-bg"><div id="bar-sleep" class="bar-fill" style="width:100%;"></div></div>
        </div>
      </section>

      <footer id="action-bar">
        <button class="action-btn" data-action="feed"><span>🌾</span>餵食</button>
        <button class="action-btn" data-action="water"><span>💧</span>飲水</button>
        <button class="action-btn" data-action="play"><span>🧸</span>玩耍</button>
        <button class="action-btn" data-action="bath"><span>🛀</span>洗澡</button>
        <button class="action-btn" data-action="sleep"><span>🛌</span>睡覺</button>
        <button class="action-btn" data-action="doctor"><span>💊</span>看病</button>
        <button class="action-btn" data-action="clean"><span>💩</span>清屎</button>
        <button class="action-btn" data-action="work"><span>💼</span>工作</button>
        <button class="action-btn" data-action="daily"><span>🎁</span>獎勵</button>
        <button class="action-btn full-w" data-action="shop">🏪 商店 / 背包</button>
      </footer>

    </div>
  </div>

  <div id="shop-modal" class="modal hidden">
    <div class="modal-box pixel-panel">
      <div class="modal-header">
        <span class="pixel-title">🏪 商店與背包</span>
        <button class="close-btn" data-close="shop-modal">X</button>
      </div>
      <div class="shop-tabs">
        <button class="tab-btn active" data-tab="food">飼料</button>
        <button class="tab-btn" data-tab="goods">道具</button>
        <button class="tab-btn" data-tab="wear">裝扮</button>
        <button class="tab-btn" data-tab="bg">場景</button>
      </div>
      <div class="modal-body" id="shop-list"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-box pixel-panel">
      <div class="modal-header">
        <span class="pixel-title">⚙️ 設定</span>
        <button class="close-btn" data-close="settings-modal">X</button>
      </div>
      <div class="modal-body">
        <label class="setting-row">
          <span>小雞名稱</span>
          <input id="name-input" maxlength="8" type="text" />
        </label>
        <label class="setting-row">
          <span>音效</span>
          <input id="sfx-toggle" type="checkbox" checked />
        </label>
        <button id="save-btn" class="action-btn small">💾 立即儲存</button>
        <button id="reset-btn" class="action-btn small danger">🗑️ 重新開始</button>
      </div>
    </div>
  </div>

  <div id="death-modal" class="modal hidden">
    <div class="modal-box pixel-panel">
      <div class="modal-header">
        <span class="pixel-title">😇 小雞去了天堂...</span>
      </div>
      <div class="modal-body" style="text-align:center;">
        <canvas id="angel-canvas" width="120" height="120"></canvas>
        <p class="pixel-sub" id="death-stats"></p>
        <button id="restart-btn" class="action-btn">🐣 重新開始</button>
      </div>
    </div>
  </div>

</body>
</html>
